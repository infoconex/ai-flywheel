title: AI Flywheel
description: An evidence-driven operating model for AI systems that learn from execution and improve how work is performed.
url: https://infoconex.github.io
baseurl: /ai-flywheel
repository: infoconex/ai-flywheel

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-seo-tag

# Apply the site layout to existing Markdown without adding frontmatter to every page.
defaults:
  - scope:
      path: ""
    values:
      layout: default
