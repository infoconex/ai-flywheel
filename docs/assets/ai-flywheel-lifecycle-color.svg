<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">AI Flywheel lifecycle</title>
  <desc id="desc">Eight-stage AI Flywheel lifecycle showing Execute, Observe, Evaluate, Classify, Adapt, Validate, Persist, and Reuse, surrounded by continuous governance.</desc>
  <style>
    .stage { stroke:#fff; stroke-width:12; stroke-linejoin:round; }
    .label { fill:#fff; font:700 31px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; text-anchor:middle; }
    .number { fill:none; stroke:#fff; stroke-width:3; }
    .number-text { fill:#fff; font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; text-anchor:middle; dominant-baseline:middle; }
    .icon { fill:#fff; font:700 54px "Segoe UI Symbol","Arial Unicode MS",sans-serif; text-anchor:middle; dominant-baseline:middle; }
    .center-title { fill:#08275a; font:800 68px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; text-anchor:middle; }
    .center-sub { fill:#263750; font:500 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; text-anchor:middle; }
    .gov { fill:#08275a; font:700 29px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; letter-spacing:3px; text-anchor:middle; }
  </style>
  <rect width="1200" height="1200" fill="#fff"/>

  <!-- Governance surrounds the entire lifecycle rather than forming a ninth stage. -->
  <circle cx="600" cy="600" r="565" fill="none" stroke="#8ba0bf" stroke-width="4" stroke-dasharray="12 14"/>
  <rect x="375" y="16" width="450" height="48" rx="24" fill="#fff"/>
  <text x="600" y="51" class="gov">GOVERNANCE APPLIES THROUGHOUT</text>
  <g transform="translate(600 76)"><circle r="27" fill="#fff" stroke="#8ba0bf" stroke-width="3"/><path d="M0-15 15-9v12c0 13-8 21-15 25-7-4-15-12-15-25V-9Z" fill="#08275a"/><path d="m-7 2 5 6 10-13" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></g>

  <!-- Eight canonical lifecycle stages, clockwise. -->
  <path class="stage" fill="#1769D2" d="M413.6,114.5 A520,520 0 0 1 786.4,114.5 L707.5,319.9 A300,300 0 0 0 492.5,319.9 Z"/>
  <path class="stage" fill="#18A7B7" d="M811.5,125 A520,520 0 0 1 1075,388.5 L874.1,478 A300,300 0 0 0 722,325.9 Z"/>
  <path class="stage" fill="#56B447" d="M1085.5,413.6 A520,520 0 0 1 1085.5,786.4 L880.1,707.5 A300,300 0 0 0 880.1,492.5 Z"/>
  <path class="stage" fill="#F2B51D" d="M1075,811.5 A520,520 0 0 1 811.5,1075 L722,874.1 A300,300 0 0 0 874.1,722 Z"/>
  <path class="stage" fill="#F47A0B" d="M786.4,1085.5 A520,520 0 0 1 413.6,1085.5 L492.5,880.1 A300,300 0 0 0 707.5,880.1 Z"/>
  <path class="stage" fill="#7C45C6" d="M388.5,1075 A520,520 0 0 1 125,811.5 L325.9,722 A300,300 0 0 0 478,874.1 Z"/>
  <path class="stage" fill="#4337A8" d="M114.5,786.4 A520,520 0 0 1 114.5,413.6 L319.9,492.5 A300,300 0 0 0 319.9,707.5 Z"/>
  <path class="stage" fill="#E83B73" d="M125,388.5 A520,520 0 0 1 388.5,125 L478,325.9 A300,300 0 0 0 325.9,478 Z"/>

  <!-- Stage content -->
  <g><circle cx="600" cy="168" r="23" class="number"/><text x="600" y="168" class="number-text">1</text><text x="600" y="226" class="icon">▶</text><text x="600" y="284" class="label">Execute</text></g>
  <g><circle cx="905" cy="295" r="23" class="number"/><text x="905" y="295" class="number-text">2</text><text x="905" y="353" class="icon">◉</text><text x="905" y="411" class="label">Observe</text></g>
  <g><circle cx="1032" cy="600" r="23" class="number"/><text x="1032" y="600" class="number-text">3</text><text x="1032" y="658" class="icon">✓</text><text x="1032" y="716" class="label">Evaluate</text></g>
  <g><circle cx="905" cy="905" r="23" class="number"/><text x="905" y="905" class="number-text">4</text><text x="905" y="963" class="icon">◇</text><text x="905" y="1021" class="label">Classify</text></g>
  <g><circle cx="600" cy="1032" r="23" class="number"/><text x="600" y="1032" class="number-text">5</text><text x="600" y="974" class="icon">⚙</text><text x="600" y="916" class="label">Adapt</text></g>
  <g><circle cx="295" cy="905" r="23" class="number"/><text x="295" y="905" class="number-text">6</text><text x="295" y="847" class="icon">✓</text><text x="295" y="789" class="label">Validate</text></g>
  <g><circle cx="168" cy="600" r="23" class="number"/><text x="168" y="600" class="number-text">7</text><text x="168" y="542" class="icon">▣</text><text x="168" y="484" class="label">Persist</text></g>
  <g><circle cx="295" cy="295" r="23" class="number"/><text x="295" y="295" class="number-text">8</text><text x="295" y="353" class="icon">↻</text><text x="295" y="411" class="label">Reuse</text></g>

  <!-- Center message and continuous flow. -->
  <circle cx="600" cy="600" r="276" fill="#fff" stroke="#d9e1ed" stroke-width="6"/>
  <path d="M400 600a200 200 0 0 1 317-162" fill="none" stroke="#9fb0c8" stroke-width="5" stroke-linecap="round"/>
  <path d="m711 423 28 6-17 23" fill="#9fb0c8"/>
  <path d="M800 600a200 200 0 0 1-317 162" fill="none" stroke="#9fb0c8" stroke-width="5" stroke-linecap="round"/>
  <path d="m489 777-28-6 17-23" fill="#9fb0c8"/>
  <text x="600" y="555" class="center-title">AI Flywheel</text>
  <line x1="455" y1="590" x2="745" y2="590" stroke="#1769D2" stroke-width="4"/>
  <text x="600" y="640" class="center-sub">A loop repeats.</text>
  <text x="600" y="680" class="center-sub" font-weight="700">A flywheel compounds.</text>

  <!-- Reuse to Execute emphasis -->
  <g transform="translate(42 182)">
    <rect width="220" height="104" rx="18" fill="#fff" stroke="#E83B73" stroke-width="4"/>
    <text x="110" y="39" text-anchor="middle" fill="#08275a" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="23" font-weight="700">Reuse feeds the</text>
    <text x="110" y="72" text-anchor="middle" fill="#08275a" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="23" font-weight="700">next execution.</text>
  </g>
  <path d="M260 235 C340 180 390 150 455 142" fill="none" stroke="#E83B73" stroke-width="5" stroke-dasharray="9 9"/>
  <path d="m446 129 29 10-21 21" fill="#E83B73"/>
</svg>
