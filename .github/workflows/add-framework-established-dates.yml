name: Add framework established dates

on:
  push:
    branches:
      - docs/initial-documentation

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/initial-documentation
          fetch-depth: 0

      - name: Add established date sections
        shell: python
        run: |
          from pathlib import Path

          sections = {
              'docs/research/frameworks/metis.md': '''## Established / First Public Date

**June 23, 2026** — used here as the earliest verified public establishment date for Metis because the canonical [Metis paper](https://arxiv.org/abs/2606.24151) was first submitted to arXiv on that date.

No earlier official project release, source-code repository, or standalone project publication was identified in the primary-source review completed for this dossier.
''',
              'docs/research/frameworks/moss.md': '''## Established / First Public Date

**May 21, 2026** — used here as the earliest verified public establishment date for MOSS because the canonical [MOSS paper](https://arxiv.org/abs/2605.22794) was first submitted to arXiv on that date.

No earlier official public release was established from the primary sources reviewed for this dossier.
''',
              'docs/research/frameworks/masfly.md': '''## Established / First Public Date

**February 14, 2026** — used here as the earliest verified public establishment date for MASFly because the canonical [MAS-on-the-Fly paper](https://arxiv.org/abs/2602.13671) was first submitted to arXiv on that date.

No earlier official project release or implementation repository was identified in the primary-source review completed for this dossier.
''',
              'docs/research/frameworks/ralph.md': '''## Established / First Public Date

**July 14, 2025** — used here as the earliest verified public establishment date for Ralph in this research because Geoffrey Huntley’s canonical article, [Ralph Wiggum as a “software engineer”](https://ghuntley.com/ralph/), is dated July 14, 2025.

Ralph is a technique rather than a single formal academic framework. Earlier experiments, posts, or informal usage may predate the canonical article, but an earlier primary public source has not yet been established in this research.
''',
              'docs/research/frameworks/reflexion.md': '''## Established / First Public Date

**March 20, 2023** — used here as the earliest verified public establishment date for Reflexion because the canonical [Reflexion paper](https://arxiv.org/abs/2303.11366) was first submitted to arXiv on that date.

No earlier official public release was established from the primary sources reviewed for this dossier.
''',
          }

          for file_name, section in sections.items():
              path = Path(file_name)
              text = path.read_text(encoding='utf-8')
              if '## Established / First Public Date' in text:
                  continue
              marker = '\n## Research Objective\n'
              if marker not in text:
                  raise RuntimeError(f'Research Objective marker not found in {file_name}')
              text = text.replace(marker, '\n' + section + marker, 1)
              path.write_text(text, encoding='utf-8')

      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/research/frameworks/*.md
          git commit -m "Add established dates to framework research"
          git push origin docs/initial-documentation

# Triggered for framework date normalization.
