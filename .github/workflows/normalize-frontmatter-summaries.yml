name: Normalize frontmatter summaries

on:
  push:
    branches:
      - docs/initial-documentation
    paths:
      - '.github/workflows/normalize-frontmatter-summaries.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/initial-documentation
      - name: Normalize summary length
        shell: python
        run: |
          from pathlib import Path
          import json
          for path in Path('.').rglob('*.md'):
              text = path.read_text(encoding='utf-8')
              if not text.startswith('---\n'):
                  continue
              lines = text.splitlines()
              changed = False
              for index, line in enumerate(lines):
                  if not line.startswith('summary: '):
                      continue
                  try:
                      value = json.loads(line[len('summary: '):])
                  except Exception:
                      continue
                  if len(value) <= 220:
                      continue
                  shortened = value[:220].rsplit(' ', 1)[0].rstrip(' ,;:')
                  if shortened and shortened[-1] not in '.!?':
                      shortened += '.'
                  lines[index] = 'summary: ' + json.dumps(shortened, ensure_ascii=False)
                  changed = True
                  break
              if changed:
                  path.write_text('\n'.join(lines) + ('\n' if text.endswith('\n') else ''), encoding='utf-8')
      - name: Commit normalized summaries
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.md' 'docs/**/*.md'
          git commit -m "Normalize frontmatter summaries"
          git push origin HEAD:docs/initial-documentation
