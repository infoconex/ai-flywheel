name: Remove frontmatter

on:
  push:
    branches:
      - docs/initial-documentation

permissions:
  contents: write

jobs:
  remove-frontmatter:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/initial-documentation
      - name: Remove YAML frontmatter from Markdown files
        shell: python
        run: |
          from pathlib import Path

          for path in Path('.').rglob('*.md'):
              text = path.read_text(encoding='utf-8')
              if not text.startswith('---\n'):
                  continue

              end = text.find('\n---\n', 4)
              if end == -1:
                  continue

              body = text[end + 5:]
              while body.startswith('\n'):
                  body = body[1:]
              path.write_text(body, encoding='utf-8')
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.md' docs README.md || true
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove frontmatter from documentation"
          git push origin docs/initial-documentation
